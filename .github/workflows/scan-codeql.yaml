name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/scan-codeql.yaml@91aa56610cd3321f8897bbe2657c1743b3df3436 # master
    with:
      repository-name: jellyfin/jellyfin-plugin-template
